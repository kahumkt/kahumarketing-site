<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- Mascote: silhueta geométrica de cachorro de perfil (facing right) -->
  <g transform="translate(0, 2)">
    <!-- Corpo/silhueta principal -->
    <path d="
      M 8 72
      L 8 48
      C 8 36 14 28 22 22
      L 22 10
      C 22 6 26 4 28 6
      L 32 14
      C 38 10 44 10 48 12
      L 52 6
      C 54 3 58 5 57 9
      L 54 18
      C 60 24 64 32 64 44
      L 64 72
      Z
    " fill="#1a2a1c"/>
    <!-- Orelha esquerda highlight -->
    <path d="M 22 10 L 26 20 L 22 22 Z" fill="#f2ede0" opacity="0.6"/>
    <!-- Olho/detalhe facial -->
    <circle cx="50" cy="28" r="3" fill="#f2ede0"/>
    <!-- Diamante decorativo à direita -->
    <path d="M 70 22 L 74 27 L 70 32 L 66 27 Z" fill="#1a2a1c"/>

    <!-- Barras verdes abaixo do mascote (3 barras decrescentes) -->
    <rect x="8" y="59" width="48" height="6" rx="1" fill="#2f9e44"/>
    <rect x="8" y="67" width="36" height="5" rx="1" fill="#2f9e44"/>
    <rect x="8" y="74" width="22" height="4" rx="1" fill="#2f9e44"/>
  </g>

  <!-- Separador pontilhado -->
  <circle cx="92" cy="38" r="2.5" fill="#1a2a1c"/>

  <!-- Wordmark "Kahu" -->
  <text
    x="102"
    y="46"
    font-family="Kufam, sans-serif"
    font-weight="700"
    font-size="42"
    fill="#1a2a1c"
    letter-spacing="-1"
  >Kahu</text>

  <!-- Subtitle "MARKETING" -->
  <text
    x="104"
    y="64"
    font-family="Kufam, DM Sans, sans-serif"
    font-weight="500"
    font-size="11"
    fill="#1a2a1c"
    letter-spacing="3.5"
  >MARKETING</text>
</svg>
